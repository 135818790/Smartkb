# SmartKB CI —— 每次 push 自动运行 Ragas 评估
# 面试要点：CI 中的质量评估 = 工程化质量保障体系

name: SmartKB RAG 质量评估

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"          # 源码改了才跑
      - "tests/**"        # 测试用例改了才跑
  pull_request:
    branches: [main, master]
  workflow_dispatch:       # 手动触发

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            models/
          key: models-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install langchain-openai pandas

      - name: Start SmartKB server
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # 创建测试文档
          cp tests/test_cases.json data/documents/
          # 后台启动服务
          python -m uvicorn src.api.main:app --host 127.0.0.1 --port 8001 &
          # 等待模型加载（首次需要下载，给足时间）
          sleep 120
          # 确认服务可用
          curl -s http://127.0.0.1:8001/health || (echo "Server failed to start" && exit 1)

      - name: Run Ragas evaluation
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python tests/eval.py tests/test_cases.json

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-results
          path: tests/eval_result.json
